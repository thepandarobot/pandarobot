<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
    
<link rel="stylesheet" href="{{'_layouts/default.css'}}">

{%- include head.html -%}

<body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">

        <div class="wrapper">
            <!--h1 class="page-heading">Tumblr feed</h1-->
            <script type="application/javascript" src="https://pandarobotwastaken.tumblr.com/js" X-Content-Type-Options="nosniff"></script>
            
            <div class="search">
                <i class="fa fa-search" aria-hidden="true"></i>
                <input type="text" id="search-input" placeholder="Search posts by keyword ...">
                <ul id="results-container"></ul>
            </div>
        </div>

        <div class="wrapper">
            <div class="grid grid-centered">
              <div class="grid-cell">
                {{ content }}
              </div>
             </div>
        </div>
    </main>

    {%- include footer.html -%}

    <script
        src="https://cdn.rawgit.com/christian-fei/Simple-Jekyll-Search/master/dest/simple-jekyll-search.min.js"></script>

    <script>
        window.simpleJekyllSearch = new SimpleJekyllSearch({
            searchInput: document.getElementById('search-input'),
            resultsContainer: document.getElementById('results-container'),
            json: '{{ site.baseurl }}/search.json',
            searchResultTemplate: '<li><a href="{url}?query={query}" title="{desc}">{title}</a></li>',
            noResultsText: 'No results found',
            limit: 10,
            fuzzy: false,
            exclude: ['Welcome']
        })
    </script>

</body>

</html>
