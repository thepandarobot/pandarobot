<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">


{%- include head.html -%}
    <head>
    <style>
        body {
          /* The image used */
          background-image: url("https://raw.githubusercontent.com/thepandarobot/pandarobot/main/_resources/BG_SITE.png");

          
          background-repeat: repeat-y;
          background-position: top center;
         
        }
        p {
              color: black;
            }

         a {
              color: white !important;
            }
        h1 {
              color: black;
            }
            .site-title{
            content: url("https://raw.githubusercontent.com/thepandarobot/pandarobot/main/_resources/header.png");

            height: 100px !important;
            top: 5px;
            padding-right: 50px;
            color: black;

            /* Hide the text. */
            text-indent: 100%;
            white-space: nowrap;
            overflow: hidden;
            font-size: 0 !important;
            }

            .site-nav{
              top: 15px;
            }
    </style>
    </head>

{%- include header.html -%}
    <main class="page-content" aria-label="Content">

        <div class="wrapper">
            {{ content }}
        </div>
    </main>
    {%- include footer.html -%}
  </body>
</html>
